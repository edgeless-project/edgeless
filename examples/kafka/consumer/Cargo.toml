[workspace]

[profile.dev]
panic = "abort"

[profile.release]
lto = true
opt-level = "z"
panic = "abort"
codegen-units = 1
strip = true

[package]
name = "kafka_consumer"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
edgeless_function = { path = "../../../edgeless_function" }
rdkafka = "0.36.2" 
tokio = { version = "1", features = ["full"] }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
openssl-sys = "0.9"


[[bin]]
name = "consumer"
path = "consumer.rs"
